spring.application.name=TransactionManager
server.port=6060

##Actuator configuration
info.app.name="Transaction Manager"
info.app.verion="1.0.0"
info.app.description="Appiction to manage Transactions"

management.endpoints.web.exposure.include=*
management.endpoints.web.exposure.exclude=health,info
management.info.env.enabled=true

# Kafka Configurations
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=transaction-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest


# Custom Application Configurations
app.kafka.topic=transaction-topic


# H2 Database Configuration (for example)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

