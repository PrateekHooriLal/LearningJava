server.port=8085

# H2 Database Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Datasource
spring.datasource.url=jdbc:h2:mem:walletdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# =============================================================================
# Resilience4j Circuit Breaker Configuration — exchangeRateService
# =============================================================================
# The instance name "exchangeRateService" must match the `name` in @CircuitBreaker(name="exchangeRateService")
#
# slidingWindowSize: How many recent calls to track when deciding state transitions.
#   10 = evaluate the last 10 calls.
#
# failureRateThreshold: % of calls that must fail to OPEN the circuit.
#   50 = if 5 out of 10 calls fail → circuit opens.
#
# waitDurationInOpenState: How long the circuit stays OPEN before trying HALF-OPEN.
#   10s = after 10 seconds, allow a test call through.
#
# permittedNumberOfCallsInHalfOpenState: How many test calls to allow in HALF-OPEN state.
#   3 = if 3 test calls succeed → circuit CLOSES. If any fail → OPENS again.
#
# minimumNumberOfCalls: Minimum calls before the circuit can decide to open.
#   Prevents the circuit from opening after just 1 failed call on startup.
#
# INTERVIEW TALKING POINT:
#   "The sliding window approach means we don't need a fixed time bucket.
#    A burst of 5 failures in a row within any 10-call window will open the circuit."
# =============================================================================
resilience4j.circuitbreaker.instances.exchangeRateService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.exchangeRateService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.exchangeRateService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.exchangeRateService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.exchangeRateService.minimumNumberOfCalls=5
